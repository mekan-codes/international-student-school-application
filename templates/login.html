{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block auth_content %}
<div class="auth-card">
  <div class="auth-brand">
    <i class="bi bi-globe2"></i>
    <span>ISS Support</span>
  </div>
  <h2>Welcome back</h2>
  <p class="muted">Sign in to your account to continue.</p>

  <form method="post">
    <label>Email</label>
    <input type="email" name="email" required autofocus placeholder="you@school.com">

    <label>Password</label>
    <input type="password" name="password" required placeholder="••••••••">

    <button type="submit" class="btn btn-primary w-100 mt-3">Sign in</button>
  </form>

  <p class="text-center mt-3 mb-0">
    No account? <a href="{{ url_for('auth.register') }}">Register as a student</a>
  </p>

  <div class="demo-block">
    <strong>Demo accounts</strong>
    <div>Admin — admin@school.com / admin123</div>
    <div>Student — student1@school.com / student123</div>
  </div>
</div>
{% endblock %}
