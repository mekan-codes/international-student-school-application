{% extends "base.html" %}
{% block title %}{{ module_title }}{% endblock %}

{% block content %}
<div class="card">
  <div class="card-body text-center py-5">
    <div class="coming-soon-art">
      <i class="bi bi-stars"></i>
    </div>
    <h2 class="mt-3 mb-2">{{ module_title }}</h2>
    <p class="text-muted mb-4">This module is coming soon to the International Lounge.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">
      <i class="bi bi-arrow-left"></i> Back to dashboard
    </a>
  </div>
</div>
{% endblock %}
